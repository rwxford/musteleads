<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="icon-clip">
      <rect width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>
  <g clip-path="url(#icon-clip)">
    <rect width="512" height="512" fill="#fff"/>
    
    <g fill="#000">
      <!-- Body — sleek elongated ellipse, slight rightward tilt -->
      <ellipse cx="240" cy="296" rx="38" ry="136"
               transform="rotate(-2 240 296)"/>

      <!-- Upper body / chest — smooth widening -->
      <ellipse cx="252" cy="208" rx="34" ry="48"
               transform="rotate(6 252 208)"/>

      <!-- Neck — bridges head to body -->
      <ellipse cx="262" cy="166" rx="28" ry="26"
               transform="rotate(12 262 166)"/>

      <!-- Head — tilted toward snout -->
      <ellipse cx="284" cy="122" rx="38" ry="25"
               transform="rotate(16 284 122)"/>

      <!-- Snout — sleek, tapered -->
      <ellipse cx="326" cy="132" rx="26" ry="11"
               transform="rotate(20 326 132)"/>

      <!-- Ear — alert, pointed -->
      <ellipse cx="252" cy="86" rx="9" ry="22"
               transform="rotate(-8 252 86)"/>

      <!-- Tail — elegant swoosh -->
      <path d="
        M 258,412
        C 276,420 306,426 334,418
        C 354,412 368,400 370,388
        C 372,380 366,375 358,378
        C 346,384 330,392 312,400
        C 290,408 270,412 256,408
        Z
      "/>
    </g>

    <!-- Eye -->
    <circle cx="298" cy="116" r="7" fill="#fff"/>
    <!-- Nose tip -->
    <circle cx="346" cy="138" r="3" fill="#fff"/>
  </g>
</svg>