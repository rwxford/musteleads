<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#000"/>
  <g fill="#fff">
    <!-- Body -->
    <ellipse cx="14.2" cy="19" rx="2.6" ry="8.6"/>
    <!-- Upper body -->
    <ellipse cx="15" cy="13.2" rx="2.3" ry="3.2"
             transform="rotate(5 15 13.2)"/>
    <!-- Neck -->
    <ellipse cx="15.6" cy="10.5" rx="2" ry="1.8"
             transform="rotate(10 15.6 10.5)"/>
    <!-- Head -->
