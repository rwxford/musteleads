<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="fav-clip">
      <rect width="32" height="32" rx="6" ry="6"/>
    </clipPath>
  </defs>
  <g clip-path="url(#fav-clip)">
    <!-- Background -->
    <rect width="32" height="32" fill="#000"/>

    <!-- Ears - bold circles -->
    <circle cx="9" cy="7" r="5" fill="#8B4513"/>
    <circle cx="23" cy="7" r="5" fill="#8B4513"/>

    <!-- Head - simple tapered shape -->
    <path d="
      M 16,27
      C 13,26.5 11,24 10,21
      C 8.5,17.5 8,14 8,11.5
      C 8,9 9,7.5 11,6.5
      Q 16,4.5 21,6.5
      C 23,7.5 24,9 24,11.5
      C 24,14 23.5,17.5 22,21
      C 21,24 19,26.5 16,27
      Z
    " fill="#D2691E"/>

    <!-- Muzzle -->
    <ellipse cx="16" cy="21" rx="3.5" ry="3" fill="#F5DEB3"/>

    <!-- Eyes -->
    <circle cx="13" cy="14.5" r="2" fill="#2C1810"/>
    <circle cx="19" cy="14.5" r="2" fill="#2C1810"/>

    <!-- Nose -->
    <circle cx="16" cy="19" r="1.2" fill="#2C1810"/>

    <!-- Bib hint -->
    <path d="M 13.5,25.5 L 16,29 L 18.5,25.5" fill="#F5DEB3" opacity="0.7"/>
  </g>
</svg>
