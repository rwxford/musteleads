    <ellipse cx="15.2" cy="5.5" rx="0.6" ry="1.5"
             transform="rotate(-6 15.2 5.5)"/>
    <!-- Tail -->
    <path d="M 15.4,26.5 C 17,27.2 19.5,27.5 21.5,26.8 C 23,26 23.5,25 22.5,25.2 C 20.5,25.8 18,26.4 15.5,26 Z"/>
